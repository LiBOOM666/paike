<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>项目导航中心</title>
  <style>
    :root {
      --sidebar-width: 260px;
      --sidebar-collapsed: 60px;
      --header-height: 60px;
      --primary: #4377fd;
      --text: #272727;
      --text-secondary: #606266;
      --border: #f0f0f0;
      --bg: #f5f7fa;
      --sidebar-bg: #fff;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      color: var(--text);
      background: var(--bg);
    }

    .app { display: flex; min-height: 100%; }

    /* 侧边栏 */
    .sidebar {
      position: fixed;
      top: 0; left: 0; bottom: 0;
      width: var(--sidebar-width);
      background: var(--sidebar-bg);
      box-shadow: 1px 0 4px rgba(0, 21, 41, 0.08);
      display: flex;
      flex-direction: column;
      transition: width 0.28s;
      overflow: hidden;
      z-index: 20;
    }
    .sidebar.collapsed { width: var(--sidebar-collapsed); }

    .logo {
      height: var(--header-height);
      display: flex;
      align-items: center;
      justify-content: center;
      border-bottom: 1px solid var(--border);
      overflow: hidden;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .logo-icon {
      width: 34px; height: 34px;
      border-radius: 8px;
      background: linear-gradient(135deg, #4377fd, #6a9aff);
      display: flex; align-items: center; justify-content: center;
      color: #fff; font-weight: 700; font-size: 16px;
      flex-shrink: 0;
    }
    .logo-text {
      margin-left: 10px;
      font-size: 18px;
      font-weight: 600;
      color: var(--text);
      opacity: 1;
      transition: opacity 0.2s;
    }
    .sidebar.collapsed .logo-text { opacity: 0; width: 0; margin: 0; }

    .menu { flex: 1; overflow-y: auto; padding: 12px 10px; }

    .menu-group { margin-bottom: 6px; }
    .menu-item {
      display: flex;
      align-items: center;
      padding: 12px 14px;
      color: #303133;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
      user-select: none;
    }
    .menu-item:hover { background: rgba(67, 119, 253, 0.15); }
    .menu-item.active { background: var(--primary); color: #fff; }
    .menu-item svg {
      width: 18px; height: 18px;
      margin-right: 10px;
      flex-shrink: 0;
      fill: currentColor;
    }
    .menu-title {
      flex: 1;
      font-size: 14px;
      white-space: nowrap;
      overflow: hidden;
      opacity: 1;
      transition: opacity 0.2s;
    }
    .sidebar.collapsed .menu-title { opacity: 0; width: 0; }
    .arrow {
      width: 14px; height: 14px;
      margin-left: auto;
      flex-shrink: 0;
      transition: transform 0.2s;
    }
    .menu-item.expanded .arrow { transform: rotate(90deg); }
    .sidebar.collapsed .arrow { opacity: 0; width: 0; margin: 0; }

    .submenu {
      overflow: hidden;
      max-height: 0;
      transition: max-height 0.25s ease-out;
      padding-left: 14px;
    }
    .submenu.open { max-height: 500px; }
    .submenu .menu-item {
      padding: 10px 14px;
      font-size: 13px;
      color: var(--text-secondary);
      margin-bottom: 4px;
    }
    .submenu .menu-item.active { background: var(--primary); color: #fff; }

    /* 主区域 */
    .main {
      flex: 1;
      margin-left: var(--sidebar-width);
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      transition: margin-left 0.28s;
    }
    .main.collapsed { margin-left: var(--sidebar-collapsed); }

    .header {
      height: var(--header-height);
      background: #fff;
      box-shadow: 0 1px 4px rgba(0, 21, 41, 0.08);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .header-left { display: flex; align-items: center; }
    .hamburger {
      width: 22px; height: 22px;
      cursor: pointer;
      color: var(--text-secondary);
      flex-shrink: 0;
    }
    .breadcrumb {
      margin-left: 16px;
      color: var(--text-secondary);
      font-size: 14px;
    }
    .breadcrumb span + span::before {
      content: '/';
      margin: 0 8px;
      color: #c0c4cc;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 20px;
      color: var(--text-secondary);
      font-size: 14px;
    }
    .header-item { cursor: pointer; display: flex; align-items: center; gap: 6px; }
    .header-item:hover { color: var(--primary); }
    .avatar {
      width: 32px; height: 32px;
      border-radius: 50%;
      background: var(--primary);
      color: #fff;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px;
    }

    .content {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* 首页缺省图 */
    .placeholder {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      background: var(--bg);
      padding: 40px;
    }
    .placeholder-img {
      width: 320px;
      max-width: 80%;
      height: auto;
      opacity: 0.9;
    }
    .placeholder h2 {
      margin-top: 24px;
      color: var(--text);
      font-weight: 500;
    }
    .placeholder p {
      margin-top: 8px;
      color: var(--text-secondary);
      font-size: 14px;
    }

    /* iframe 内容区 */
    .page-frame {
      flex: 1;
      width: 100%;
      border: none;
      display: none;
      background: #fff;
    }
    .page-frame.active { display: block; }
    .placeholder.hidden { display: none; }

    /* 外链提示条 */
    .external-tip {
      display: none;
      align-items: center;
      justify-content: center;
      padding: 16px;
      background: #fff;
      border-bottom: 1px solid var(--border);
      color: var(--text-secondary);
      font-size: 14px;
      gap: 12px;
    }
    .external-tip.active { display: flex; }
    .external-tip a { color: var(--primary); text-decoration: none; }
  </style>
</head>
<body>
  <div class="app">
    <!-- 左侧路由 -->
    <aside class="sidebar" id="sidebar">
      <div class="logo">
        <div class="logo-icon">导</div>
        <span class="logo-text">项目导航中心</span>
      </div>
      <nav class="menu" id="menu"></nav>
    </aside>

    <!-- 主框架 -->
    <div class="main" id="main">
      <header class="header">
        <div class="header-left">
          <svg class="hamburger" id="hamburger" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
            <path d="M408 442h480c4.4 0 8-3.6 8-8v-56c0-4.4-3.6-8-8-8H408c-4.4 0-8 3.6-8 8v56c0 4.4 3.6 8 8 8zm0 160h480c4.4 0 8-3.6 8-8v-56c0-4.4-3.6-8-8-8H408c-4.4 0-8 3.6-8 8v56c0 4.4 3.6 8 8 8zm0 160h480c4.4 0 8-3.6 8-8v-56c0-4.4-3.6-8-8-8H408c-4.4 0-8 3.6-8 8v56c0 4.4 3.6 8 8 8zM136 416h56c4.4 0 8-3.6 8-8v-56c0-4.4-3.6-8-8-8h-56c-4.4 0-8 3.6-8 8v56c0 4.4 3.6 8 8 8zm0 160h56c4.4 0 8-3.6 8-8v-56c0-4.4-3.6-8-8-8h-56c-4.4 0-8 3.6-8 8v56c0 4.4 3.6 8 8 8zm0 160h56c4.4 0 8-3.6 8-8v-56c0-4.4-3.6-8-8-8h-56c-4.4 0-8 3.6-8 8v56c0 4.4 3.6 8 8 8z" fill="currentColor"/>
          </svg>
          <div class="breadcrumb" id="breadcrumb"></div>
        </div>
        <div class="header-right">
          <div class="header-item">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.9 2 2 2zm6-6v-5c0-3.07-1.63-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.64 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2zm-2 1H8v-6c0-2.48 1.51-4.5 4-4.5s4 2.02 4 4.5v6z"/></svg>
            <span>任务中心</span>
          </div>
          <div class="header-item">
            <div class="avatar">管</div>
            <span>个人中心</span>
          </div>
        </div>
      </header>

      <main class="content">
        <div class="external-tip" id="externalTip">
          <span>该页面为外部系统，将在新标签页中打开。如未自动跳转，请点击：</span>
          <a href="#" id="externalLink" target="_blank">打开链接</a>
        </div>

        <!-- 首页缺省图 -->
        <div class="placeholder" id="placeholder">
          <svg class="placeholder-img" viewBox="0 0 640 360" xmlns="http://www.w3.org/2000/svg">
            <rect width="640" height="360" rx="12" fill="#e8eefc"/>
            <circle cx="320" cy="150" r="60" fill="#4377fd" opacity="0.15"/>
            <path d="M280 150 L320 110 L360 150 L340 150 L340 190 L300 190 L300 150 Z" fill="#4377fd"/>
            <rect x="220" y="240" width="200" height="16" rx="8" fill="#c5d3f7"/>
            <rect x="260" y="270" width="120" height="12" rx="6" fill="#d7e1f9"/>
          </svg>
          <h2 id="page-title">首页</h2>
          <p>点击左侧路由按钮，打开对应的页面</p>
        </div>

        <!-- 页面 iframe -->
        <iframe class="page-frame" id="pageFrame" title="页面内容"></iframe>
      </main>
    </div>
  </div>

  <script>
    const BASE_URL = 'https://liboom666.github.io/paike/';

    // 一二级路由结构
    const menu = [
      { title: '首页', type: 'home', icon: 'home' },
      { title: '每周计划', file: 'paike.html', icon: 'calendar' },
      { title: '学期计划', file: 'jihua_guanli.html', icon: 'plan' },
      { title: '智能体广场', file: 'ourteacher.html', icon: 'robot' },
      {
        title: '园所资源', icon: 'resource', children: [
          { title: '活动方案库', file: 'hdfa.html' },
          { title: '素材资源库', file: 'ziyuanku.html' }
        ]
      },
      {
        title: '园所管理', icon: 'manage', children: [
          { title: '用户管理', url: 'https://datacenter.qiaozhihui.net/setpark/user' },
          { title: '组织管理', url: 'https://datacenter.qiaozhihui.net/setpark/dept' },
          { title: '角色管理', url: 'https://datacenter.qiaozhihui.net/setpark/role' },
          { title: '学期管理', file: 'xueqi.html' },
          { title: '时段管理', file: 'shiduan.html' }
        ]
      }
    ];

    const icons = {
      home: '<svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>',
      calendar: '<svg viewBox="0 0 24 24"><path d="M19 3h-1V1h-2v2H8V1H6v2H5c-1.11 0-2 .9-2 2v14c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V8h14v11z"/></svg>',
      plan: '<svg viewBox="0 0 24 24"><path d="M14 2H6c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V8l-6-6zm-1 7V3.5L18.5 9H13z"/></svg>',
      robot: '<svg viewBox="0 0 24 24"><path d="M12 2a2 2 0 0 1 2 2c0 .74-.4 1.38-1 1.72v1.28h5c1.1 0 2 .9 2 2v10c0 1.1-.9 2-2 2H6c-1.1 0-2-.9-2-2V9c0-1.1.9-2 2-2h5V5.72A2.001 2.001 0 0 1 12 2zm-4 9c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm8 0c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2z"/></svg>',
      resource: '<svg viewBox="0 0 24 24"><path d="M20 6h-8l-2-2H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2z"/></svg>',
      manage: '<svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>',
      file: '<svg viewBox="0 0 24 24"><path d="M14 2H6c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V8l-6-6zm4 18H6V4h7v5h5v11z"/></svg>',
      link: '<svg viewBox="0 0 24 24"><path d="M3.9 12c0-1.71 1.39-3.1 3.1-3.1h4V7H7c-2.76 0-5 2.24-5 5s2.24 5 5 5h4v-1.9H7c-1.71 0-3.1-1.39-3.1-3.1zM8 13h8v-2H8v2zm9-6h-4v1.9h4c1.71 0 3.1 1.39 3.1 3.1s-1.39 3.1-3.1 3.1h-4V17h4c2.76 0 5-2.24 5-5s-2.24-5-5-5z"/></svg>'
    };

    let activeKey = 'home';
    let expandedKeys = new Set();

    function renderMenu() {
      const menuEl = document.getElementById('menu');
      menuEl.innerHTML = menu.map((group, gIndex) => {
        const groupKey = `group-${gIndex}`;
        const hasChildren = Array.isArray(group.children);
        const isGroupActive = activeKey === groupKey || (hasChildren && group.children.some(c => c.key === activeKey));
        const isExpanded = expandedKeys.has(groupKey);

        return `
          <div class="menu-group">
            <div class="menu-item ${isGroupActive ? 'active' : ''} ${isExpanded ? 'expanded' : ''}" data-group="${gIndex}" data-key="${groupKey}">
              ${icons[group.icon] || icons.file}
              <span class="menu-title">${group.title}</span>
              ${hasChildren ? `<svg class="arrow" viewBox="0 0 24 24" fill="currentColor"><path d="M8.59 16.59L13.17 12 8.59 7.41 10 6l6 6-6 6z"/></svg>` : ''}
            </div>
            ${hasChildren ? `
              <div class="submenu ${isExpanded ? 'open' : ''}" data-submenu="${gIndex}">
                ${group.children.map((child, cIndex) => {
                  const childKey = `child-${gIndex}-${cIndex}`;
                  child.key = childKey;
                  return `
                    <div class="menu-item ${activeKey === childKey ? 'active' : ''}" data-group="${gIndex}" data-child="${cIndex}" data-key="${childKey}">
                      ${child.url ? icons.link : icons.file}
                      <span class="menu-title">${child.title}</span>
                    </div>
                  `;
                }).join('')}
              </div>
            ` : ''}
          </div>
        `;
      }).join('');

      // 绑定事件
      menuEl.querySelectorAll('.menu-item').forEach(el => {
        el.addEventListener('click', function () {
          const gIndex = Number(this.dataset.group);
          const cIndex = this.dataset.child !== undefined ? Number(this.dataset.child) : null;
          const group = menu[gIndex];

          if (cIndex !== null) {
            // 点击二级菜单
            const child = group.children[cIndex];
            activeKey = child.key;
            navigate(child, group.title);
            renderMenu();
          } else if (group.children) {
            // 点击一级菜单：展开/收起
            const key = `group-${gIndex}`;
            expandedKeys.has(key) ? expandedKeys.delete(key) : expandedKeys.add(key);
            renderMenu();
          } else {
            // 点击一级叶子菜单
            activeKey = `group-${gIndex}`;
            navigate(group, null);
            renderMenu();
          }
        });
      });
    }

    function navigate(item, parentTitle) {
      const placeholder = document.getElementById('placeholder');
      const frame = document.getElementById('pageFrame');
      const title = document.getElementById('page-title');
      const desc = placeholder.querySelector('p');
      const breadcrumb = document.getElementById('breadcrumb');

      // 隐藏外部提示条
      const externalTip = document.getElementById('externalTip');
      if (externalTip) externalTip.classList.remove('active');

      const pathParts = ['<span>首页</span>'];
      if (parentTitle) pathParts.push(`<span>${parentTitle}</span>`);
      pathParts.push(`<span>${item.title}</span>`);
      breadcrumb.innerHTML = pathParts.join('');
      title.textContent = item.title;

      if (item.type === 'home') {
        frame.classList.remove('active');
        frame.src = '';
        desc.textContent = '点击左侧路由按钮，打开对应的页面';
        return;
      }

      if (item.url) {
        // 外部系统：直接在新标签页打开
        window.open(item.url, '_blank');
        placeholder.classList.remove('hidden');
        frame.classList.remove('active');
        frame.src = '';
        desc.textContent = `已在浏览器新标签页打开：${item.url}`;
        return;
      }

      if (item.file) {
        placeholder.classList.add('hidden');
        frame.classList.add('active');
        frame.src = BASE_URL + item.file;
        desc.textContent = '点击左侧路由按钮，打开对应的页面';
      }
    }

    // 侧边栏折叠
    document.getElementById('hamburger').addEventListener('click', () => {
      document.getElementById('sidebar').classList.toggle('collapsed');
      document.getElementById('main').classList.toggle('collapsed');
    });

    // 初始化
    renderMenu();
    navigate(menu[0], null);
  </script>
</body>
</html>
