<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>教师档案</title>
  <style>
    /* ===== 基础重置与变量 ===== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --primary: #1890ff;
      --primary-hover: #46a6ff;
      --primary-active: #1682e6;
      --primary-light: #e8f4ff;
      --accent: #4377fd;
      --success: #13ce66;
      --warning: #ffba00;
      --danger: #ff4949;
      --text-main: #303133;
      --text-normal: #606266;
      --text-secondary: #909399;
      --border-color: #dcdfe6;
      --border-card: #e6ebf5;
      --table-border: #dfe6ec;
      --table-header-bg: #f8f8f9;
      --table-header-text: #515a6e;
      --table-hover: #f5f7fa;
      --bg-main: #f4f7fe;
      --bg-white: #ffffff;
      --shadow-card: 0 2px 12px rgba(0, 0, 0, 0.1);
      --shadow-header: 0 1px 4px rgba(0, 21, 41, 0.08);
      --radius: 4px;
    }

    html, body {
      height: 100%;
      font-family: "Helvetica Neue", Helvetica, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", Arial, sans-serif;
      font-size: 14px;
      color: var(--text-main);
      background: var(--bg-main);
    }

    /* ===== 顶部 Header ===== */
    .app-header {
      height: 60px;
      background: var(--bg-white);
      border-bottom: 1px solid var(--border-card);
      box-shadow: var(--shadow-header);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .app-header-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .app-title {
      font-size: 18px;
      font-weight: 600;
      color: var(--text-main);
    }

    .app-header-right {
      display: flex;
      align-items: center;
      gap: 20px;
      color: var(--text-normal);
    }

    .header-user {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
    }

    .avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: var(--accent);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
    }

    /* ===== 面包屑 ===== */
    .breadcrumb-bar {
      display: none;
      align-items: center;
      padding: 16px 24px 0;
      font-size: 13px;
      color: var(--text-secondary);
    }

    .breadcrumb-bar.visible {
      display: flex;
    }

    .breadcrumb-bar span + span::before {
      content: '>';
      margin: 0 8px;
      color: var(--text-secondary);
    }

    .breadcrumb-bar a {
      color: var(--text-secondary);
      text-decoration: none;
      cursor: pointer;
    }

    .breadcrumb-bar a:hover {
      color: var(--primary);
    }

    .breadcrumb-bar .current {
      color: var(--text-main);
    }

    /* ===== 主内容区 ===== */
    .main-content {
      padding: 20px 24px;
      min-height: calc(100vh - 60px);
    }

    .page {
      display: none;
    }

    .page.active {
      display: block;
    }

    /* ===== 通用卡片 ===== */
    .card {
      background: var(--bg-white);
      border: 1px solid var(--border-card);
      border-radius: var(--radius);
      box-shadow: var(--shadow-card);
      margin-bottom: 16px;
    }

    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      border-bottom: 1px solid var(--border-card);
    }

    .card-title {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 16px;
      font-weight: 600;
      color: var(--text-main);
    }

    .card-title::before {
      content: '';
      width: 4px;
      height: 16px;
      background: var(--success);
      border-radius: 2px;
    }

    .card-actions {
      display: flex;
      gap: 10px;
    }

    .card-body {
      padding: 20px;
    }

    /* ===== 按钮 ===== */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      height: 32px;
      padding: 0 16px;
      border: 1px solid var(--border-color);
      border-radius: var(--radius);
      background: var(--bg-white);
      color: var(--text-normal);
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .btn:hover {
      border-color: var(--primary);
      color: var(--primary);
    }

    .btn-primary {
      background: var(--primary);
      border-color: var(--primary);
      color: #fff;
    }

    .btn-primary:hover {
      background: var(--primary-hover);
      border-color: var(--primary-hover);
      color: #fff;
    }

    .btn-success {
      background: var(--success);
      border-color: var(--success);
      color: #fff;
    }

    .btn-success:hover {
      opacity: 0.85;
      color: #fff;
    }

    .btn-warning {
      background: var(--warning);
      border-color: var(--warning);
      color: #fff;
    }

    .btn-danger {
      background: var(--danger);
      border-color: var(--danger);
      color: #fff;
    }

    .btn-text {
      border: none;
      background: transparent;
      padding: 0 6px;
      color: var(--primary);
    }

    .btn-text:hover {
      color: var(--primary-hover);
    }

    .btn-icon {
      padding: 0 8px;
    }

    .btn-sm {
      height: 28px;
      padding: 0 10px;
      font-size: 13px;
    }

    /* ===== 表单控件 ===== */
    .form-row {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      margin-bottom: 16px;
    }

    .form-row:last-child {
      margin-bottom: 0;
    }

    .form-item {
      flex: 1;
      min-width: 200px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .form-item.half {
      flex: 0 0 calc(50% - 10px);
    }

    .form-label {
      font-size: 13px;
      color: var(--text-normal);
    }

    .form-label .required::before {
      content: '*';
      color: var(--danger);
      margin-right: 4px;
    }

    .form-input,
    .form-select,
    .form-textarea {
      height: 36px;
      padding: 0 12px;
      border: 1px solid var(--border-color);
      border-radius: var(--radius);
      font-size: 14px;
      color: var(--text-main);
      outline: none;
      transition: border-color 0.2s;
      width: 100%;
    }

    .form-input:focus,
    .form-select:focus,
    .form-textarea:focus {
      border-color: var(--primary);
    }

    .form-textarea {
      height: auto;
      min-height: 80px;
      padding: 10px 12px;
      resize: vertical;
    }

    .form-error {
      font-size: 12px;
      color: var(--danger);
      display: none;
    }

    .form-error.visible {
      display: block;
    }

    /* ===== 列表页搜索区 ===== */
    .search-card {
      padding: 20px;
      margin-bottom: 16px;
    }

    .search-form {
      display: flex;
      flex-wrap: wrap;
      align-items: flex-end;
      gap: 16px;
    }

    .search-item {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .search-item label {
      font-size: 13px;
      color: var(--text-normal);
    }

    .search-item input,
    .search-item select {
      width: 160px;
      height: 32px;
      padding: 0 10px;
      border: 1px solid var(--border-color);
      border-radius: var(--radius);
      font-size: 14px;
      outline: none;
    }

    .search-item input:focus,
    .search-item select:focus {
      border-color: var(--primary);
    }

    .search-actions {
      display: flex;
      gap: 10px;
      margin-left: auto;
    }

    /* ===== 表格 ===== */
    .table-card {
      overflow: hidden;
    }

    .data-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
      color: var(--text-normal);
    }

    .data-table thead {
      background: var(--table-header-bg);
    }

    .data-table th {
      height: 40px;
      padding: 12px 10px;
      text-align: left;
      font-weight: 500;
      color: var(--table-header-text);
      font-size: 13px;
      border-bottom: 1px solid var(--table-border);
      white-space: nowrap;
    }

    .data-table td {
      padding: 12px 10px;
      border-bottom: 1px solid var(--table-border);
      vertical-align: middle;
    }

    .data-table tbody tr:hover {
      background: var(--table-hover);
    }

    .data-table tbody tr:last-child td {
      border-bottom: none;
    }

    .status-tag {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      height: 24px;
      padding: 0 8px;
      border-radius: var(--radius);
      font-size: 12px;
      line-height: 1;
    }

    .status-tag.active {
      background: #e7faf0;
      color: var(--success);
      border: 1px solid #a1ebc2;
    }

    .status-tag.inactive {
      background: #f4f4f5;
      color: var(--text-secondary);
      border: 1px solid #e6ebf5;
    }

    /* ===== 分页 ===== */
    .pagination-bar {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding: 16px 20px;
      border-top: 1px solid var(--border-card);
      gap: 12px;
      font-size: 13px;
      color: var(--text-normal);
    }

    .page-size-select {
      height: 28px;
      padding: 0 8px;
      border: 1px solid var(--border-color);
      border-radius: var(--radius);
      outline: none;
    }

    .page-numbers {
      display: flex;
      gap: 6px;
    }

    .page-btn {
      min-width: 28px;
      height: 28px;
      padding: 0 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--border-color);
      border-radius: var(--radius);
      background: var(--bg-white);
      color: var(--text-normal);
      cursor: pointer;
      font-size: 13px;
      transition: all 0.2s;
    }

    .page-btn:hover {
      border-color: var(--primary);
      color: var(--primary);
    }

    .page-btn.active {
      background: var(--primary);
      border-color: var(--primary);
      color: #fff;
    }

    .page-btn.disabled {
      cursor: not-allowed;
      color: var(--text-secondary);
      border-color: var(--border-color);
    }

    .page-btn.disabled:hover {
      border-color: var(--border-color);
      color: var(--text-secondary);
    }

    .page-go {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .page-go input {
      width: 40px;
      height: 28px;
      text-align: center;
      border: 1px solid var(--border-color);
      border-radius: var(--radius);
      outline: none;
    }

    /* ===== 详情页头部 ===== */
    .detail-header {
      display: flex;
      align-items: center;
      gap: 20px;
      padding: 20px;
      margin-bottom: 16px;
    }

    .detail-avatar {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), var(--primary-hover));
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      font-weight: 600;
      flex-shrink: 0;
    }

    .detail-meta {
      flex: 1;
    }

    .detail-name {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .detail-tags {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .detail-tag {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 4px 10px;
      background: var(--primary-light);
      color: var(--primary);
      border-radius: var(--radius);
      font-size: 13px;
    }

    /* ===== Tab 组件 ===== */
    .detail-tabs {
      display: flex;
      gap: 8px;
      padding: 0 20px;
      margin-bottom: 16px;
    }

    .tab-item {
      height: 32px;
      padding: 0 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--border-color);
      border-radius: var(--radius);
      background: var(--bg-white);
      color: var(--text-normal);
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .tab-item:hover {
      color: var(--primary);
      border-color: var(--primary);
    }

    .tab-item.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    .tab-panel {
      display: none;
    }

    .tab-panel.active {
      display: block;
    }

    /* ===== 信息展示网格 ===== */
    .info-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px 24px;
    }

    .info-item {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .info-label {
      font-size: 13px;
      color: var(--text-secondary);
    }

    .info-value {
      font-size: 14px;
      color: var(--text-main);
      word-break: break-all;
    }

    /* ===== 列表型卡片 ===== */
    .list-section {
      margin-bottom: 16px;
    }

    .list-item {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border-card);
      position: relative;
    }

    .list-item:last-child {
      border-bottom: none;
    }

    .list-item-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 8px;
    }

    .list-item-title {
      font-size: 15px;
      font-weight: 500;
      color: var(--text-main);
    }

    .list-item-actions {
      display: flex;
      gap: 8px;
    }

    .icon-btn {
      width: 28px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: none;
      background: transparent;
      color: var(--text-secondary);
      cursor: pointer;
      border-radius: var(--radius);
      transition: all 0.2s;
    }

    .icon-btn:hover {
      background: var(--primary-light);
      color: var(--primary);
    }

    .icon-btn.delete:hover {
      background: #ffeded;
      color: var(--danger);
    }

    .list-item-body {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px 24px;
      font-size: 13px;
      color: var(--text-normal);
    }

    .list-item-body span {
      color: var(--text-secondary);
    }

    .list-item-body strong {
      color: var(--text-main);
      font-weight: normal;
    }

    .empty-tip {
      text-align: center;
      padding: 40px 20px;
      color: var(--text-secondary);
      font-size: 14px;
    }

    /* ===== 年度计划时间线 ===== */
    .plan-timeline {
      position: relative;
      padding-left: 20px;
    }

    .plan-item {
      position: relative;
      padding-bottom: 24px;
    }

    .plan-item::before {
      content: '';
      position: absolute;
      left: -14px;
      top: 6px;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--success);
      border: 2px solid #fff;
      box-shadow: 0 0 0 1px var(--success);
    }

    .plan-item::after {
      content: '';
      position: absolute;
      left: -10px;
      top: 18px;
      bottom: 0;
      width: 1px;
      background: var(--border-card);
    }

    .plan-item:last-child::after {
      display: none;
    }

    .plan-year {
      font-size: 16px;
      font-weight: 600;
      color: var(--text-main);
      margin-bottom: 12px;
    }

    .plan-content {
      display: grid;
      gap: 12px;
    }

    .plan-block {
      background: #fafafa;
      border-radius: var(--radius);
      padding: 12px 16px;
    }

    .plan-block-title {
      font-size: 13px;
      color: var(--text-secondary);
      margin-bottom: 6px;
    }

    .plan-block-text {
      font-size: 14px;
      color: var(--text-main);
      line-height: 1.6;
    }

    /* ===== 弹窗 ===== */
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.45);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .modal-overlay.visible {
      display: flex;
    }

    .modal {
      background: var(--bg-white);
      border-radius: var(--radius);
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.3);
      width: 100%;
      max-width: 640px;
      max-height: 90vh;
      display: flex;
      flex-direction: column;
      animation: modalIn 0.25s ease;
    }

    @keyframes modalIn {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      border-bottom: 1px solid var(--border-card);
    }

    .modal-title {
      font-size: 16px;
      font-weight: 600;
    }

    .modal-close {
      width: 28px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: none;
      background: transparent;
      color: var(--text-secondary);
      cursor: pointer;
      font-size: 18px;
      border-radius: var(--radius);
    }

    .modal-close:hover {
      background: var(--table-hover);
      color: var(--text-main);
    }

    .modal-body {
      padding: 20px;
      overflow-y: auto;
      flex: 1;
    }

    .modal-footer {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      padding: 12px 20px;
      border-top: 1px solid var(--border-card);
    }

    /* ===== AI 生成按钮 ===== */
    .ai-generate {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      background: var(--primary-light);
      color: var(--primary);
      border: 1px solid var(--primary);
      border-radius: var(--radius);
      font-size: 13px;
      cursor: pointer;
      margin-bottom: 8px;
    }

    .ai-generate:hover {
      background: var(--primary);
      color: #fff;
    }

    /* ===== 响应式 ===== */
    @media (max-width: 1200px) {
      .info-grid,
      .list-item-body {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (max-width: 768px) {
      .main-content {
        padding: 12px;
      }
      .search-form {
        flex-direction: column;
        align-items: stretch;
      }
      .search-item input,
      .search-item select {
        width: 100%;
      }
      .search-actions {
        margin-left: 0;
        justify-content: flex-end;
      }
      .info-grid,
      .list-item-body {
        grid-template-columns: 1fr;
      }
      .detail-tabs {
        flex-wrap: wrap;
      }
    }
  </style>
</head>
<body>
  <!-- 顶部 Header -->
  <header class="app-header">
    <div class="app-header-left">
      <h1 class="app-title">教师档案</h1>
    </div>
    <div class="app-header-right"></div>
  </header>

  <!-- 面包屑 -->
  <div class="breadcrumb-bar" id="breadcrumbBar">
    <a onclick="showList()">教师管理</a>
    <a onclick="showList()">教师列表</a>
    <span class="current" id="breadcrumbCurrent">教师详情</span>
  </div>

  <!-- 主内容 -->
  <main class="main-content">
    <!-- 列表页 -->
    <div class="page active" id="page-list">
      <div class="card search-card">
        <div class="search-form">
          <div class="search-item">
            <label>姓名搜索</label>
            <input type="text" id="searchName" placeholder="请输入姓名">
          </div>
          <div class="search-item">
            <label>所属班级</label>
            <select id="searchClass">
              <option value="">全部</option>
              <option value="大一班">大一班</option>
              <option value="大二班">大二班</option>
              <option value="中一班">中一班</option>
              <option value="中二班">中二班</option>
              <option value="小一班">小一班</option>
              <option value="小二班">小二班</option>
            </select>
          </div>
          <div class="search-item">
            <label>岗位</label>
            <select id="searchPosition">
              <option value="">全部</option>
              <option value="班主任">班主任</option>
              <option value="配班老师">配班老师</option>
              <option value="副班主任">副班主任</option>
              <option value="实习老师">实习老师</option>
            </select>
          </div>
          <div class="search-item">
            <label>在职状态</label>
            <select id="searchStatus">
              <option value="">全部</option>
              <option value="在职">在职</option>
              <option value="离职">离职</option>
              <option value="休假">休假</option>
            </select>
          </div>
          <div class="search-actions">
            <button class="btn btn-primary" onclick="handleSearch()">
              <span>🔍</span> 搜索
            </button>
            <button class="btn" onclick="handleReset()">重置</button>
            <button class="btn btn-warning" onclick="handleExport()">导出</button>
          </div>
        </div>
      </div>

      <div class="card table-card">
        <table class="data-table">
          <thead>
            <tr>
              <th>教师姓名</th>
              <th>所属班级</th>

    // ============================================================

    function renderTable() {
      const tbody = document.getElementById('teacherTableBody');
      const start = (currentPage - 1) * pageSize;
      const end = start + pageSize;
      const pageData = filteredData.slice(start, end);

      if (pageData.length === 0) {
        tbody.innerHTML = `<tr><td colspan="6" class="empty-tip">暂无数据</td></tr>`;
      } else {
        tbody.innerHTML = pageData.map(t => `
          <tr>
            <td>${t.name}</td>
            <td>${t.className}</td>
            <td>${t.position}</td>
            <td>${t.years}年</td>
            <td><span class="status-tag ${t.status === '在职' ? 'active' : 'inactive'}">${t.status}</span></td>
            <td><button class="btn btn-text" onclick="showDetail(${t.id})">查看</button></td>
          </tr>
        `).join('');
      }

      document.getElementById('totalCount').textContent = filteredData.length;
      renderPagination();
    }

    function renderPagination() {
      const totalPages = Math.max(1, Math.ceil(filteredData.length / pageSize));
      const container = document.getElementById('pageNumbers');
      let html = '';

      html += `<button class="page-btn ${currentPage === 1 ? 'disabled' : ''}" onclick="changePage(${currentPage - 1})">‹</button>`;

      for (let i = 1; i <= totalPages; i++) {
        if (i === 1 || i === totalPages || (i >= currentPage - 2 && i <= currentPage + 2)) {
          html += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="changePage(${i})">${i}</button>`;
        } else if (i === currentPage - 3 || i === currentPage + 3) {
          html += `<span class="page-btn disabled">...</span>`;
        }
      }

      html += `<button class="page-btn ${currentPage === totalPages ? 'disabled' : ''}" onclick="changePage(${currentPage + 1})">›</button>`;
      container.innerHTML = html;
    }

    function changePage(page) {
      const totalPages = Math.ceil(filteredData.length / pageSize);
      if (page < 1 || page > totalPages) return;
      currentPage = page;
      renderTable();
    }

    function changePageSize() {
      pageSize = parseInt(document.getElementById('pageSize').value);
      currentPage = 1;
      renderTable();
    }

    function goToPage() {
      const input = document.getElementById('goToPage');
      const page = parseInt(input.value);
      if (page) changePage(page);
      input.value = '';
    }

    function handleSearch() {
      const name = document.getElementById('searchName').value.trim();
      const cls = document.getElementById('searchClass').value;
      const position = document.getElementById('searchPosition').value;
      const status = document.getElementById('searchStatus').value;

      filteredData = TEACHERS_DATA.filter(t => {
        return (!name || t.name.includes(name))
          && (!cls || t.className === cls)
          && (!position || t.position === position)
          && (!status || t.status === status);
      });

      currentPage = 1;
      renderTable();
    }

    function handleReset() {
      document.getElementById('searchName').value = '';
      document.getElementById('searchClass').value = '';
      document.getElementById('searchPosition').value = '';
      document.getElementById('searchStatus').value = '';
      handleSearch();
    }

    function handleExport() {
      const csvContent = [
        ['教师姓名', '所属班级', '岗位', '工龄', '状态'],
        ...filteredData.map(t => [t.name, t.className, t.position, t.years + '年', t.status])
      ].map(row => row.join(',')).join('\n');

      const blob = new Blob(['﻿' + csvContent], { type: 'text/csv;charset=utf-8;' });
      const link = document.createElement('a');
      link.href = URL.createObjectURL(blob);
      link.download = `教师档案_${new Date().toLocaleDateString()}.csv`;
      link.click();
    }

      ]},

      ]},

        { name: 'level', label: '荣誉级别', type: 'select', options: ['国家级','省级','市级','区级','校级'], required: true },
        { name: 'date', label: '获奖时间', type: 'month', required: true },

      ]},

        { name: 'summary', label: '年度总结', type: 'textarea', required: true, ai: true }
      ]}
    };

    function openModal(type, index, isAdd) {
      modalType = type;
      modalIndex = index;
      modalIsAdd = !!isAdd;
      const config = MODAL_CONFIG[type];
      const teacher = getCurrentTeacher();

      let data = {};
      if (type === 'basicInfo') data = { ...teacher.basicInfo };
      else if (type === 'positionInfo') data = { ...teacher.positionInfo };
      else if (type === 'titleInfo') data = { ...teacher.titleInfo };
      else if (!isAdd && index !== null && index !== undefined) {
        const arrKey = getArrayKey(type);
        data = { ...teacher[arrKey][index] };
      }

      document.getElementById('modalTitle').textContent = (isAdd ? '新增' : '编辑') + config.title;
      document.getElementById('modalBody').innerHTML = renderFormFields(config.fields, data);
      document.getElementById('modalOverlay').classList.add('visible');
    }

    function getArrayKey(type) {
      const map = {
        certificate: 'certificates',
        education: 'educationList',
        honor: 'honors',
        research: 'research',
        award: 'awards',
        paper: 'papers',
        openClass: 'openClasses',
        annualPlan: 'annualPlans'
      };
      return map[type];
    }

    function renderFormFields(fields, data) {
      return fields.map(f => {
        const value = data[f.name] !== undefined ? data[f.name] : '';
        let inputHtml = '';
        if (f.type === 'select') {
          inputHtml = `<select class="form-input" name="${f.name}" data-required="${!!f.required}">
            ${f.options.map(opt => `<option value="${opt}" ${opt === value ? 'selected' : ''}>${opt}</option>`).join('')}
          </select>`;
        } else if (f.type === 'textarea') {
          inputHtml = `<textarea class="form-textarea" name="${f.name}" placeholder="${f.placeholder || ''}" data-required="${!!f.required}">${value}</textarea>`;
          if (f.ai) {
            inputHtml = `<button type="button" class="ai-generate" onclick="aiGenerate(this)">✨ AI 生成</button>` + inputHtml;
          }
        } else {
          inputHtml = `<input class="form-input" type="${f.type}" name="${f.name}" value="${value}" placeholder="${f.placeholder || ''}" data-required="${!!f.required}">`;
        }
        return `
          <div class="form-item ${f.type === 'textarea' ? '' : 'half'}">
            <div class="form-label">${f.required ? '<span class="required"></span>' : ''}${f.label}</div>
            ${inputHtml}
            <div class="form-error" id="error-${f.name}">请输入${f.label}</div>
          </div>
        `;
      }).join('');
    }

    function closeModal() {
      document.getElementById('modalOverlay').classList.remove('visible');
    }

    function closeModalOnOverlay(event) {
      if (event.target === document.getElementById('modalOverlay')) {
        closeModal();
      }
    }

    function saveModal() {
      const teacher = getCurrentTeacher();
      const config = MODAL_CONFIG[modalType];
      const formData = {};
      let hasError = false;

      config.fields.forEach(f => {
        const el = document.querySelector(`[name="${f.name}"]`);
        const value = el.value.trim();
        formData[f.name] = value;

        const errorEl = document.getElementById(`error-${f.name}`);
        if (f.required && !value) {
          errorEl.classList.add('visible');
          hasError = true;
        } else {
          errorEl.classList.remove('visible');
        }
      });

      if (hasError) return;

      if (modalType === 'basicInfo') teacher.basicInfo = { ...teacher.basicInfo, ...formData };
      else if (modalType === 'positionInfo') teacher.positionInfo = { ...teacher.positionInfo, ...formData };
      else if (modalType === 'titleInfo') teacher.titleInfo = { ...teacher.titleInfo, ...formData };
      else {
        const arrKey = getArrayKey(modalType);
        if (!teacher[arrKey]) teacher[arrKey] = [];
        if (modalIsAdd) {
          formData.id = Date.now();
          teacher[arrKey].push(formData);
        } else {
          teacher[arrKey][modalIndex] = { ...teacher[arrKey][modalIndex], ...formData };
        }
      }

      closeModal();
      renderDetail();
    }

    function deleteItem(arrKey, index) {
      if (!confirm('确定要删除这条记录吗？')) return;
      const teacher = getCurrentTeacher();
      teacher[arrKey].splice(index, 1);
      renderDetail();
    }

    function aiGenerate(btn) {
      const textarea = btn.nextElementSibling;
      const originalText = btn.textContent;
      btn.textContent = '⏳ 生成中...';
      btn.disabled = true;

      setTimeout(() => {
        if (!textarea.value.trim()) {
          textarea.value = '本年度将继续围绕幼儿核心素养发展，深入开展主题探究活动，注重过程性评价与家园协同，促进每位幼儿在原有水平上获得发展。';
        } else {
          textarea.value += '\n\n【AI 补充】结合班级实际情况，建议增加项目式学习环节，鼓励幼儿在真实情境中解决问题，提升自主学习能力。';
        }
        btn.textContent = originalText;
        btn.disabled = false;
      }, 600);
    }
  </script>
